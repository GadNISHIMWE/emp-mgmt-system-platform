<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Employee Dashboard - EMS</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="dashboard">
  <aside class="sidebar">
    <h2>EMS</h2>
    <ul>
      <li class="active">Dashboard</li>
      <li>My Profile</li>
      <li>Tasks</li>
      <li>Attendance</li>
      <li onclick="logout()">Logout</li>
    </ul>
  </aside>

  <div class="main">
    <div class="topbar">
      <h1>Employee Dashboard</h1>
      <p>Welcome, <span id="emp-name">...</span></p>
    </div>

    <div class="cards">
      <div class="card">
        <p class="card-label">My Department</p>
        <span id="emp-department">—</span>
      </div>
      <div class="card">
        <p class="card-label">My Position</p>
        <span id="emp-position">—</span>
      </div>
      <div class="card">
        <p class="card-label">Account Email</p>
        <span id="emp-email">—</span>
      </div>
    </div>

    <div class="section">
      <h2>My Colleagues</h2>
      <table>
        <thead>
          <tr>
            <th>Name</th>
            <th>Department</th>
            <th>Position</th>
          </tr>
        </thead>
        <tbody id="colleaguesTable"></tbody>
      </table>
    </div>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script src="script.js"></script>
</body>
</html>
