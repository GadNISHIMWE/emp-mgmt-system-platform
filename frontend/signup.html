<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Sign Up - EMS</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="auth-page">

<div class="auth-wrapper">
  <div class="login-container">
    <h2>Create Account</h2>
    <p>Join EMS Platform today</p>

    <!-- Success message (hidden until signup completes) -->
    <div id="signup-success" class="success-message" style="display:none;">
      ✅ Account created successfully! Redirecting to login...
    </div>

    <!-- Signup form -->
    <div id="signup-form">
      <input type="text" id="username" placeholder="Username">
      <input type="email" id="email" placeholder="Email address">
      <input type="password" id="password" placeholder="Password">

      <select id="role">
        <option value="admin">Employer</option>
        <option value="employee">Employee</option>
      </select>

      <button class="btn-primary" id="signup-btn" onclick="signup()">Sign Up</button>
    </div>

    <p class="signup-link">Already have an account? <a href="login.html">Login</a></p>
    <p class="signup-link"><a href="index.html">← Back to Home</a></p>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script src="script.js"></script>
</body>
</html>
